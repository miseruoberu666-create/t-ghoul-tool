<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京喰種 設定判別 V3</title>
<!-- PWA用の設定を紐付け -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 15px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 420px; margin: auto; }
        h2 { text-align: center; color: #d32f2f; margin-bottom: 20px; border-bottom: 3px solid #d32f2f; padding-bottom: 10px; font-size: 22px; }
        .section-title { font-size: 14px; font-weight: bold; color: #d32f2f; margin: 15px 0 8px 0; display: flex; align-items: center; }
        .section-title::before { content: ""; display: inline-block; width: 4px; height: 14px; background: #d32f2f; margin-right: 8px; border-radius: 2px; }
        
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; margin-bottom: 3px; font-weight: bold; color: #666; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; background: #fafafa; }
        input:focus { border-color: #d32f2f; outline: none; background: #fff; }
        
        .calc-area { background: #fdf2f2; padding: 12px; border-radius: 12px; margin: 15px 0; text-align: center; border: 1px dashed #d32f2f; }
        .calc-area span { font-size: 24px; font-weight: bold; color: #d32f2f; }
        
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #d32f2f, #b71c1c); color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(211, 47, 47, 0.3); }
        button:active { transform: translateY(2px); box-shadow: none; }
        
        #result { margin-top: 20px; }
        .prob-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 6px solid #d32f2f; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .at-box { border-left-color: #1976d2; background: #f0f7ff; } /* AT結果は色を変えて区別 */
        .rank { font-weight: bold; color: #d32f2f; font-size: 1.1em; }
        .at-rank { color: #1976d2; }
        .small-text { font-size: 11px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>東京喰種 判別ツール V3</h2>
    
    <div class="section-title">ゲーム数入力</div>
    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 1;">
            <label>総ゲーム数</label>
            <input type="number" id="totalGames" placeholder="データ機" oninput="updateRealGames()">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>AT中ゲーム</label>
            <input type="number" id="atGames" placeholder="AT合計" oninput="updateRealGames()">
        </div>
    </div>

    <div class="calc-area">
        実ゲーム数（通常時）: <br>
        <span id="realGamesDisplay">0</span> <small>G</small>
    </div>
    
    <div class="section-title">CZ回数（絞り込み用）</div>
    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 1;">
            <label>レミニセンス</label>
            <input type="number" id="remiCount" placeholder="回数">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>大喰いのリゼ</label>
            <input type="number" id="rizeCount" placeholder="回数">
        </div>
    </div>

    <div class="section-title">AT初当たり（詳細判別用）</div>
    <div class="input-group">
        <label>AT初当たり回数</label>
        <input type="number" id="atHitCount" placeholder="着席後にチェック！">
    </div>

    <button onclick="calculate()">判別を実行！</button>

    <div id="result"></div>
</div>

<script>
function updateRealGames() {
    const total = parseFloat(document.getElementById('totalGames').value) || 0;
    const at = parseFloat(document.getElementById('atGames').value) || 0;
    const real = total - at;
    document.getElementById('realGamesDisplay').innerText = real > 0 ? real : 0;
}

function calculate() {
    const total = parseFloat(document.getElementById('totalGames').value) || 0;
    const at = parseFloat(document.getElementById('atGames').value) || 0;
    const games = total - at;
    
    const remi = parseFloat(document.getElementById('remiCount').value) || 0;
    const rize = parseFloat(document.getElementById('rizeCount').value) || 0;
    const atHit = parseFloat(document.getElementById('atHitCount').value) || 0;
    const resultDiv = document.getElementById('result');

    if (games <= 0) {
        resultDiv.innerHTML = "<p style='color:red; text-align:center;'>実ゲーム数が正しくありません。</p>";
        return;
    }

    // 確率計算
    const remiProb = remi > 0 ? (games / remi).toFixed(1) : "---";
    const rizeProb = rize > 0 ? (games / rize).toFixed(1) : "---";
    const atHitProb = atHit > 0 ? (games / atHit).toFixed(1) : "---";

    // 設定目安（解析値ベース）
    let remiJudge = getSetting(remiProb, [327.4, 314.1, 298.5, 281.3, 268.0, 256.4]);
    let rizeJudge = getSetting(rizeProb, [2079.1, 1926.1, 1749.5, 1478.9, 1242.4, 1074.9]);
    let atHitJudge = getSetting(atHitProb, [359.8, 351.6, 325.2, 297.0, 276.5, 259.1]);

    let html = `
        <div class="prob-box">
            <strong>レミニセンス: 1/${remiProb}</strong><br>
            目安: <span class="rank">${remiJudge}</span>
        </div>
        <div class="prob-box">
            <strong>大喰いのリゼ: 1/${rizeProb}</strong><br>
            目安: <span class="rank">${rizeJudge}</span>
        </div>
    `;

    // AT初当たりが入力されている場合のみ表示
    if (atHit > 0) {
        html += `
            <div class="prob-box at-box">
                <strong>AT初当たり: 1/${atHitProb}</strong><br>
                目安: <span class="rank at-rank">${atHitJudge}</span>
                <div class="small-text">※設定1：1/359.8 〜 設定6：1/259.1</div>
            </div>
        `;
    }

    resultDiv.innerHTML = html;
}

function getSetting(val, targets) {
    if (val === "---") return "データ不足";
    val = parseFloat(val);
    if (val <= targets[5]) return "設定6並！";
    if (val <= targets[4]) return "設定5並";
    if (val <= targets[3]) return "設定4並";
    if (val <= targets[2]) return "設定3並";
    if (val <= targets[1]) return "設定2並";
    return "設定1以下";
}
</script>

</body>
</html>
